<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ecs-sandbox terminal</title>
  <link rel="stylesheet" href="/web/static/terminal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
</head>
<body>
  <form id="connect-form">
    <input type="text" id="session-id" placeholder="Session ID (UUID)" />
    <input type="password" id="token" placeholder="Sandbox secret" />
    <button type="submit" id="connect-btn">Connect</button>
    <span id="status" class="disconnected">disconnected</span>
  </form>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="/web/static/terminal.js"></script>
</body>
</html>
